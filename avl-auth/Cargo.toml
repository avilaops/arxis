[package]
name = "avl-auth"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Identity and Access Management (IAM) with JWT, OAuth2, RBAC for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avl-auth"
readme = "README.md"
keywords = [
    "authentication",
    "authorization",
    "jwt",
    "oauth2",
    "rbac",
]
categories = ["authentication", "web-programming", "asynchronous"]
rust-version = "1.70"

[lib]
name = "avl_auth"
path = "src/lib.rs"

[features]
default = ["database", "mfa"]
database = ["aviladb"]
mfa = ["dep:totp-lite", "dep:data-encoding"]
oauth2 = ["dep:oauth2"]
full = ["database", "mfa", "oauth2"]

[dependencies]
# AVL Cloud Platform integration
aviladb = { version = "0.1.0", path = "../aviladb", optional = true }

# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }
avila-future = { version = "0.1.0", path = "../avila-future" }

# HTTP server
avila-web = { version = "0.1.0", path = "../avila-web" }
tower-http = { version = "0.6", features = ["full"] }

# JWT
jsonwebtoken = "9.3"

# Password hashing (Argon2id)
argon2 = "0.5"

# Cryptography
avila-crypto = { version = "0.1.0", path = "../avila-crypto" }
hmac = "0.12"
avila-rand = { version = "0.1.0", path = "../avila-rand" }

# MFA/TOTP
totp-lite = { version = "2.0", optional = true }
data-encoding = { version = "2.6", optional = true }

# OAuth2
oauth2 = { version = "4.4", optional = true }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# UUID generation
avila-id = { version = "0.1.0", path = "../avila-id" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

# Logging
avila-tracing = { version = "0.1.0", path = "../avila-tracing" }

[dev-dependencies]
tokio-test = "0.4"
mockito = "1.6"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
