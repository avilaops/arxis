[workspace]
# Standalone workspace to avoid parent workspace conflicts

[package]
name = "avila-primitives"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Layer 1 primitive types - 100% from scratch, zero dependencies foundation for Avila ecosystem"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
keywords = ["primitives", "no-std", "allocator", "collections", "foundation"]
categories = ["no-std", "algorithms", "data-structures"]
rust-version = "1.70"

[lib]
name = "avila_primitives"
path = "src/lib.rs"

[dependencies]
# ABSOLUTELY ZERO DEPENDENCIES - Layer 1 foundation

[features]
default = []
std = []

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.bench]
inherits = "release"

[[example]]
name = "basic_types"
path = "examples/basic_types.rs"

[[example]]
name = "collections"
path = "examples/collections.rs"

[[bench]]
name = "primitives_bench"
path = "benches/primitives_bench.rs"
harness = false
