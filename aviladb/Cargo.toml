[package]
name = "aviladb"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "AvilaDB - Globally distributed NoSQL database optimized for Brazil and LATAM"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/aviladb"
readme = "README.md"
keywords = ["database", "nosql", "distributed", "vector-search", "brazil"]
categories = ["database", "database-implementations", "data-structures"]

[dependencies]
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
anyhow = "1.0"

# Compression (internal)
avila-compress = { version = "0.1", path = "../avila-compress" }

# Networking
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Storage
# rocksdb = "0.22"  # Requires LLVM/Clang - optional for production use
bincode = "1.3"
sled = "0.34"  # Pure Rust embedded database

# Observability
tracing = "0.1"
tracing-subscriber = "0.3"
avx-telemetry = { version = "0.1", path = "../avx-telemetry" }

# Vector search
hnsw = { version = "0.11", optional = true }

# Multi-region
raft = { version = "0.7", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
proptest = "1.5"
rand = "0.8"
chrono = "0.4"

[features]
default = ["vector-search"]
vector-search = ["hnsw"]
distributed = ["raft"]
full = ["vector-search", "distributed"]

[[bench]]
name = "database_ops"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]



