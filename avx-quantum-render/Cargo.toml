[package]
name = "avx-quantum-render"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Quantum Electrodynamics (QED) renderer using Path Integral formulation"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avx-quantum-render"
readme = "README.md"
keywords = [
    "rendering",
    "qed",
    "path-integral",
    "quantum",
    "physics",
]
categories = ["rendering", "graphics", "science", "simulation"]
rust-version = "1.70"

[lib]
name = "avx_quantum_render"
path = "src/lib.rs"

[features]
default = ["std"]
std = []
gpu = ["avx-gpu"]
full = ["std", "gpu"]

[dependencies]
# AVL ecosystem
avila-math = { version = "0.1.0", path = "../avila-math" }
avila-linalg = { version = "0.1.1", path = "../avila-linalg" }
avx-gpu = { version = "0.1.0", path = "../avx-gpu", optional = true }

# N-dimensional arrays
avila-ndarray = { version = "0.1.0", path = "../avila-ndarray" }

# Parallel processing
avila-parallel = { version = "0.4.0", path = "../avila-parallel" }

# Random number generation
avila-rand = { version = "0.1.0", path = "../avila-rand" }
rand_distr = "0.4"

# FFT for spectral methods
avila-fft = { version = "0.3.0", path = "../avila-fft" }

# Image output
image = "0.25"

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

# Complex numbers
avila-fft = { version = "0.3.0", path = "../avila-fft" }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "path_integral"
harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
