[package]
name = "avila-logger"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Nícolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "Structured logging with zero overhead when disabled"
repository = "https://github.com/avilaops/arxis"
keywords = ["logging", "log", "trace", "no-std"]
categories = ["development-tools::debugging"]

[lib]
name = "avila_logger"
path = "src/lib.rs"

[features]
default = ["std"]
std = []

[dependencies]
avila-time = { path = "../avila-time" }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
