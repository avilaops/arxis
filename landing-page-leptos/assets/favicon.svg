<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Simple 4-point quaternion design for favicon -->
    <circle cx="16" cy="8" r="4" fill="url(#faviconGradient)" />
    <circle cx="24" cy="16" r="4" fill="url(#faviconGradient)" />
    <circle cx="16" cy="24" r="4" fill="url(#faviconGradient)" />
    <circle cx="8" cy="16" r="4" fill="url(#faviconGradient)" />

    <!-- Connecting lines -->
    <line x1="16" y1="8" x2="24" y2="16" stroke="#FFA500" stroke-width="2" />
    <line x1="24" y1="16" x2="16" y2="24" stroke="#FFA500" stroke-width="2" />
    <line x1="16" y1="24" x2="8" y2="16" stroke="#FFA500" stroke-width="2" />
    <line x1="8" y1="16" x2="16" y2="8" stroke="#FFA500" stroke-width="2" />

    <!-- Center -->
    <circle cx="16" cy="16" r="3" fill="#FFFFFF" stroke="#FF8C00" stroke-width="1.5" />
</svg>
