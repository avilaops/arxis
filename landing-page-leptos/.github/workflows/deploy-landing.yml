name: Deploy Landing Page

on:
    push:
        branches: [main]
        paths:
            - "landing-page-leptos/**"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "landing-pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Install Trunk
              run: |
                  wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.4/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
                  sudo mv trunk /usr/local/bin/

            - name: Build Landing Page
              working-directory: landing-page-leptos
              run: trunk build --release

            - name: Copy CNAME
              run: cp landing-page-leptos/CNAME landing-page-leptos/dist/

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "landing-page-leptos/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
