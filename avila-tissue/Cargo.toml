[package]
name = "avila-tissue"
version = "0.1.0"
edition = "2021"
authors = [
    "Nï¿½colas ï¿½vila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Email tissue layer - Storage, indexing, searching, and organization"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
keywords = ["email", "storage", "indexing", "search", "database"]
categories = ["email", "database"]

[lib]
name = "avila_tissue"
path = "src/lib.rs"

[dependencies]
# avila-nucleus (excluded)
avila-atom = {  path = "../avila-atom" }
avila-molecule = {  path = "../avila-molecule" }
avila-cell = {  path = "../avila-cell" }
avila-error = {  path = "../avila-error" }
avila-id = {  path = "../avila-id" }
avila-time = {  path = "../avila-time", features = ["serde"] }
avila-async = { version = "0.5.0", path = "../avila-async" }
# sled = "0.34" # Embedded database (TODO: readd later)
tantivy = "0.22" # Full-text search
avila-serde = { version = "0.2.0", path = "../avila-serde" }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
