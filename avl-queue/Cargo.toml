[package]
name = "avl-queue"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Message queue and event streaming (Pub/Sub, FIFO) for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avl-queue"
readme = "README.md"
keywords = [
    "message-queue",
    "pub-sub",
    "event-streaming",
    "fifo",
    "distributed",
]
categories = ["asynchronous", "web-programming", "network-programming"]
rust-version = "1.70"

[lib]
name = "avl_queue"
path = "src/lib.rs"

[features]
default = ["compression"]
compression = ["avila-compress"]
full = ["compression"]

[dependencies]
# AVL Cloud Platform integration
avila-compress = { version = "0.3.0", path = "../avila-compress", optional = true }
aviladb = { version = "0.1.0", path = "../aviladb" }

# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }
avila-future = { version = "0.1.0", path = "../avila-future" }

# HTTP client/server
avila-web = { version = "0.1.0", path = "../avila-web" }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# UUID generation
avila-id = { version = "0.1.0", path = "../avila-id" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

# Logging
avila-tracing = { version = "0.1.0", path = "../avila-tracing" }

# Concurrency
parking_lot = "0.12"

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

# [[bench]]
# name = "queue_bench"
# harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
