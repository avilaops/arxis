[package]
name = "avila-copilot-context"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Layer 3: Context manager with unlimited workspace awareness for Avila Copilot"

[dependencies]
avila-async = { workspace = true }
avila-error = { workspace = true }
avila-serde = { workspace = true }
tokio = { version = "1", features = ["fs"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
tempfile = "3"
