[package]
name = "avx-api-core"
version = "0.1.0"
edition = "2021"
authors = ["Avila DevOps <nicolas@avila.inc>"]
description = "Avx API Core - Internal business logic APIs for Avila Experience Fabric"

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
anyhow = "1"

avx-config = { path = "../avx-config" }
avx-telemetry = { path = "../avx-telemetry" }
