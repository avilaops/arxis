[package]
name = "avx-api-core"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Core API types and utilities for AVX Gateway and AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avx-api-core"
readme = "README.md"
keywords = [
    "api",
    "core",
    "gateway",
    "types",
]
categories = ["web-programming", "asynchronous"]
rust-version = "1.70"

[lib]
name = "avx_api_core"
path = "src/lib.rs"

[features]
default = []
full = []

[dependencies]
# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }
avila-future = { version = "0.1.0", path = "../avila-future" }

# HTTP types
avila-web = { version = "0.1.0", path = "../avila-web" }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# UUID generation
avila-id = { version = "0.1.0", path = "../avila-id" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

# Logging
avila-tracing = { version = "0.1.0", path = "../avila-tracing" }

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
