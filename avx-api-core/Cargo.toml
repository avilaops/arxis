[package]
name = "avx-api-core"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Core API types and business logic for Avila Experience Fabric - Shared models, traits, and utilities"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avx-api-core"
readme = "README.md"
keywords = ["api", "core", "types", "models", "utilities"]
categories = ["web-programming", "api-bindings"]
exclude = ["target/", "*.swp", ".git*"]

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
anyhow = "1"

avx-config = { version = "0.1", path = "../avx-config" }
avx-telemetry = { version = "0.1", path = "../avx-telemetry" }
