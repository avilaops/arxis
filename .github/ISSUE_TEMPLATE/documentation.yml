name: Documentation Issue
description: Report a documentation issue or suggest improvements
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Arxis documentation!

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      description: What type of documentation needs improvement?
      options:
        - API Documentation (rustdoc)
        - README
        - Examples
        - Tutorial/Guide
        - Architecture/Design docs
        - Migration guide
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Documentation Issue
      description: Describe what's missing, unclear, or incorrect
      placeholder: The documentation for X is unclear because...
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where is this documentation located?
      placeholder: |
        - File: src/geometry/quaternion3d.rs
        - Function: Quat3D::slerp
        - Line: 45-52

  - type: dropdown
    id: crate
    attributes:
      label: Affected Crate
      description: Which crate's documentation needs improvement?
      options:
        - arxis_quaternions (main)
        - avila-math
        - avila-telemetry
        - avila-compress
        - avila-tokenizers
        - aviladb
        - avx-* (AVL Platform)
        - Multiple crates
        - Documentation site
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How would you improve this documentation?
      placeholder: |
        I suggest adding:
        - Code example showing...
        - Clarification about...
        - Link to related concept...

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR to improve this documentation

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples
