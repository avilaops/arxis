version: 2
updates:
  # Root workspace Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    assignees:
      - "avilaops"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    ignore:
      # Ignore patch updates for stable dependencies
      - dependency-name: "tokio"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "serde"
        update-types: ["version-update:semver-patch"]

  # avila-clustering
  - package-ecosystem: "cargo"
    directory: "/avila-clustering"
    schedule:
