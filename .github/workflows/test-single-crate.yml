name: Test Single Crate

on:
    push:
        branches: [main]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    test-avila-math:
        name: Test avila-math
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/registry
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo index
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/git
                  key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo build
              uses: actions/cache@v4
              with:
                  path: target
                  key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

            - name: Check avila-math (isolated)
              working-directory: ./avila-math
              run: cargo check --lib

            - name: Clippy avila-math (zero warnings)
              working-directory: ./avila-math
              run: cargo clippy --lib -- -D warnings

            - name: Test avila-math
              working-directory: ./avila-math
              run: cargo test --lib

            - name: Build avila-math (release)
              working-directory: ./avila-math
              run: cargo build --lib --release

            - name: Count warnings (must be 0)
              working-directory: ./avila-math
              run: |
                  WARNINGS=$(cargo build --lib 2>&1 | grep -c "warning:" || echo "0")
                  echo "Warnings found: $WARNINGS"
                  if [ "$WARNINGS" -ne "0" ]; then
                    echo "❌ Found $WARNINGS warnings - failing build"
                    exit 1
                  fi
                  echo "✅ Zero warnings - ready to publish!"

            - name: Dry-run publish
              working-directory: ./avila-math
              run: cargo publish --dry-run
