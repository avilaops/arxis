name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-latest
        outputs:
            upload_url: ${{ steps.create_release.outputs.upload_url }}
        steps:
            - uses: actions/checkout@v4

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  draft: false
                  prerelease: false
                  body: |
                      See [CHANGELOG.md](https://github.com/avilaops/arxis/blob/main/CHANGELOG.md) for details.

    publish-crates:
        name: Publish to crates.io
        runs-on: ubuntu-latest
        needs: create-release
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Publish avila-math
              run: cargo publish -p avila-math --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
              continue-on-error: true

            - name: Wait for indexing
              run: sleep 30

            - name: Publish avila-telemetry
              run: cargo publish -p avila-telemetry --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
              continue-on-error: true

            - name: Wait for indexing
              run: sleep 30

            - name: Publish avx-config
              run: cargo publish -p avx-config --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
              continue-on-error: true

            - name: Wait for indexing
              run: sleep 30

            - name: Publish remaining crates
              run: |
                  cargo publish -p avx-telemetry --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p avx-quantum-render --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p avx-image --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p avx-gateway --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p avx-api-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p avx-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p avx-events --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
                  sleep 30
                  cargo publish -p arxis_quaternions --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

    build-binaries:
        name: Build Binaries
        runs-on: ${{ matrix.os }}
        needs: create-release
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: arxis-linux-x86_64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: arxis-windows-x86_64.exe
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact: arxis-macos-x86_64
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: arxis-macos-aarch64
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Upload Release Asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
              with:
                  upload_url: ${{ needs.create-release.outputs.upload_url }}
                  asset_path: ./target/${{ matrix.target }}/release/avx-cli${{ matrix.os == 'windows-latest' && '.exe' || '' }}
                  asset_name: ${{ matrix.artifact }}
                  asset_content_type: application/octet-stream
