[package]
name = "avila-web"
version = "0.1.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "Web framework nativo - substitui axum/tower"

[dependencies]
avila-async = { version = "0.5.0", path = "../avila-async" }
avila-error = { version = "0.2.0", path = "../avila-error", features = ["full"] }
avila-serde = { version = "0.2.0", path = "../avila-serde" }
avila-http = { version = "0.1.0", path = "../avila-http" }

[lib]
name = "avila_web"
path = "src/lib.rs"


[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
overflow-checks = false
incremental = false

[profile.dev]
opt-level = 1