[package]
name = "avl-loadbalancer"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "AVL LoadBalancer - L7 load balancer and reverse proxy for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/avl-loadbalancer"
readme = "README.md"
keywords = ["loadbalancer", "proxy", "reverse-proxy", "routing", "networking"]
categories = ["network-programming", "web-programming"]

[dependencies]
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
anyhow = "1.0"

# HTTP/Networking
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.6", features = ["full"] }
hyper = { version = "1.5", features = ["full"] }
hyper-util = "0.1"

# TLS
rustls = "0.23"
tokio-rustls = "0.26"

# Observability
tracing = "0.1"
avx-telemetry = { version = "0.1", path = "../avx-telemetry" }

# Rate limiting
governor = "0.7"

[package.metadata.docs.rs]
all-features = true
