[package]
name = "avl-storage"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "S3-compatible object storage with automatic compression for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avl-storage"
readme = "README.md"
keywords = [
    "object-storage",
    "s3",
    "cloud-storage",
    "compression",
    "distributed",
]
categories = ["database", "web-programming", "asynchronous", "compression"]
rust-version = "1.70"

[lib]
name = "avl_storage"
path = "src/lib.rs"

[features]
default = ["compression"]
compression = ["avila-compress"]
full = ["compression"]

[dependencies]
# AVL Cloud Platform integration
avila-compress = { version = "0.3.0", path = "../avila-compress", optional = true }

# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }
avila-future = { version = "0.1.0", path = "../avila-future" }

# HTTP client/server
avila-http = { version = "0.1.0", path = "../avila-http" }
avila-web = { version = "0.1.0", path = "../avila-web" }
tower-http = { version = "0.6", features = ["full"] }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Cryptography (ETag, checksums)
md5 = "0.7"
avila-crypto = { version = "0.1.0", path = "../avila-crypto" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# UUID generation
avila-id = { version = "0.1.0", path = "../avila-id" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

# Logging
avila-tracing = { version = "0.1.0", path = "../avila-tracing" }

# File handling
bytes = "1.7"

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"
avila-rand = { version = "0.1.0", path = "../avila-rand" }

# [[bench]]
# name = "upload_bench"
# harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
