events {
    worker_connections 1024;
}

http {
    upstream avila_backend {
        least_conn;
        server avila-cloud:8080;
        # Add more servers for load balancing
        # server avila-cloud-2:8080;
        # server avila-cloud-3:8080;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name avila.cloud www.avila.cloud api.avila.cloud;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.avila.cloud;

        # SSL Configuration
        ssl_certificate /etc/ssl/avila/fullchain.pem;
        ssl_certificate_key /etc/ssl/avila/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Logging
        access_log /var/log/nginx/avila-cloud-access.log;
        error_log /var/log/nginx/avila-cloud-error.log;

        # API routes
        location / {
            proxy_pass http://avila_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://avila_backend/health;
            access_log off;
        }

        # Metrics endpoint (protected)
        location /metrics {
            proxy_pass http://avila_backend/metrics;
            # Add authentication here
            # auth_basic "Metrics";
            # auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # Static files (if any)
        location /static/ {
            alias /var/www/avila-cloud/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Grafana dashboard
    server {
        listen 443 ssl http2;
        server_name dashboard.avila.cloud;

        ssl_certificate /etc/ssl/avila/fullchain.pem;
        ssl_certificate_key /etc/ssl/avila/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
