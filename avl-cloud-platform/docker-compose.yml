version: '3.8'

services:
  # Avila Cloud API
  avila-cloud:
    build:
      context: ..
      dockerfile: avila-cloud/Dockerfile
    container_name: avila-cloud-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - avila-data:/var/lib/avila-cloud/data
      - avila-logs:/var/lib/avila-cloud/logs
      - avila-config:/var/lib/avila-cloud/config
      - avila-ssl:/var/lib/avila-cloud/ssl
    environment:
      - RUST_LOG=info
      - AVILA_CLOUD_PORT=8080
    networks:
      - avila-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL (para metadata e billing)
  postgres:
    image: postgres:16-alpine
    container_name: avila-cloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: avila_cloud
      POSTGRES_USER: avila
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - avila-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avila"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (para cache e sessions)
  redis:
    image: redis:7-alpine
    container_name: avila-cloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - avila-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: avila-cloud-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - avila-net

  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: avila-cloud-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - avila-net
    depends_on:
      - prometheus

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: avila-cloud-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - avila-ssl:/etc/ssl/avila:ro
    networks:
      - avila-net
    depends_on:
      - avila-cloud

volumes:
  avila-data:
    driver: local
  avila-logs:
    driver: local
  avila-config:
    driver: local
  avila-ssl:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  avila-net:
    driver: bridge
