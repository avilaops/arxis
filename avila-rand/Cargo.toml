[package]
name = "avila-rand"
version = "0.1.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "Gerador de números aleatórios criptograficamente seguro - sem dependências externas"
repository = "https://github.com/avilaops/arxis"
keywords = ["random", "rng", "crypto", "no-std", "prng"]
categories = ["cryptography", "no-std", "algorithms"]

[workspace]

[lib]
name = "avila_rand"
path = "src/lib.rs"

[dependencies]

[dev-dependencies]

[features]
default = ["std", "getrandom"]
std = []
getrandom = []

[[bench]]
name = "rng_bench"
path = "benches/rng_bench.rs"
