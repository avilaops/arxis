name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-latest
        outputs:
            upload_url: ${{ steps.create_release.outputs.upload_url }}
        steps:
            - uses: actions/checkout@v3

            - name: Get version from tag
              id: get_version
              run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: avila-tokenizers v${{ steps.get_version.outputs.VERSION }}
                  body: |
                      # avila-tokenizers v${{ steps.get_version.outputs.VERSION }}

                      ## Installation

                      ```bash
                      cargo add avila-tokenizers@${{ steps.get_version.outputs.VERSION }}
                      ```

                      ## Changes

                      See [CHANGELOG.md](https://github.com/avilaops/arxis/blob/main/avila-tokenizer/CHANGELOG.md) for details.

                      ## Documentation

                      - [docs.rs](https://docs.rs/avila-tokenizers/${{ steps.get_version.outputs.VERSION }})
                      - [crates.io](https://crates.io/crates/avila-tokenizers)
                  draft: false
                  prerelease: false

    publish-crate:
        name: Publish to crates.io
        runs-on: ubuntu-latest
        needs: create-release
        defaults:
            run:
                working-directory: ./avila-tokenizer
        steps:
            - uses: actions/checkout@v3

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo registry
              uses: actions/cache@v3
              with:
                  path: ~/.cargo/registry
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo index
              uses: actions/cache@v3
              with:
                  path: ~/.cargo/git
                  key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

            - name: Verify package
              run: cargo package --list

            - name: Publish to crates.io
              run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
              continue-on-error: false

    build-binaries:
        name: Build Release Binaries
        runs-on: ${{ matrix.os }}
        needs: create-release
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: avila-tokenizers-linux-x64
                    - os: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      artifact_name: avila-tokenizers-linux-arm64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: avila-tokenizers-windows-x64
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact_name: avila-tokenizers-macos-x64
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact_name: avila-tokenizers-macos-arm64
        defaults:
            run:
                working-directory: ./avila-tokenizer
        steps:
            - uses: actions/checkout@v3

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux ARM64)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }}

            - name: Package binary (Unix)
              if: matrix.os != 'windows-latest'
              run: |
                  cd ../target/${{ matrix.target }}/release
                  tar czf ${{ matrix.artifact_name }}.tar.gz libavila_tokenizers.*
                  mv ${{ matrix.artifact_name }}.tar.gz ../../../avila-tokenizer/

            - name: Package binary (Windows)
              if: matrix.os == 'windows-latest'
              run: |
                  cd ..\target\${{ matrix.target }}\release
                  7z a ${{ matrix.artifact_name }}.zip avila_tokenizers.dll avila_tokenizers.lib
                  move ${{ matrix.artifact_name }}.zip ..\..\..\avila-tokenizer\
              shell: cmd

            - name: Upload Release Asset (Unix)
              if: matrix.os != 'windows-latest'
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ needs.create-release.outputs.upload_url }}
                  asset_path: ./avila-tokenizer/${{ matrix.artifact_name }}.tar.gz
                  asset_name: ${{ matrix.artifact_name }}.tar.gz
                  asset_content_type: application/gzip

            - name: Upload Release Asset (Windows)
              if: matrix.os == 'windows-latest'
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ needs.create-release.outputs.upload_url }}
                  asset_path: ./avila-tokenizer/${{ matrix.artifact_name }}.zip
                  asset_name: ${{ matrix.artifact_name }}.zip
                  asset_content_type: application/zip

    update-docs:
        name: Update Documentation
        runs-on: ubuntu-latest
        needs: publish-crate
        defaults:
            run:
                working-directory: ./avila-tokenizer
        steps:
            - uses: actions/checkout@v3

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Build documentation
              run: cargo doc --no-deps --all-features

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./avila-tokenizer/target/doc
                  destination_dir: docs/avila-tokenizers
