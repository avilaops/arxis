[package]
name = "avila-tokenizers"
version = "0.1.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "The most complete tokenizer library in Rust - BPE, WordPiece, Unigram, with native support for GPT, BERT, Llama, Claude"
repository = "https://github.com/avilaops/arxis"
keywords = ["tokenizer", "nlp", "llm", "gpt", "bert"]
categories = ["text-processing", "algorithms"]

[dependencies]
avila-regex = { version = "0.1.0", path = "../avila-regex" }
unicode-normalization = "0.1"
avila-serde = { version = "0.2.0", path = "../avila-serde" }
lru = "0.12"
avila-parallel = { version = "0.4.0", path = "../avila-parallel" }
lazy_static = "1.4"
avila-error = { version = "0.2.0", path = "../avila-error" }
avila-rand = { version = "0.1.0", path = "../avila-rand" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
avila-async = { version = "0.5.0", path = "../avila-async" }
tempfile = "3"

[features]
default = []
python = []
wasm = []

# [[bench]]
# name = "tokenize_bench"
# harness = false
