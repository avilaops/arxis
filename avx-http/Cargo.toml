[package]
name = "avx-http"
version = "0.2.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Native HTTP client/server optimized for AVL Platform - Low latency for Brazilian infrastructure, built-in telemetry, AvilaDB integration"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/avx-http"
readme = "README.md"
keywords = ["http", "client", "server", "avila", "latam"]
categories = ["network-programming", "web-programming", "asynchronous"]

[dependencies]
tokio = { version = "1.48", features = ["full"] }
bytes = "1.7"
http = "1.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
urlencoding = "2.1"
futures = "0.3"
async-trait = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Networking_WinSock"] }

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }

[features]
default = ["client", "server"]
client = []
server = []
compression = []
telemetry = []
aviladb = []

[[bench]]
name = "client_bench"
harness = false

[[bench]]
name = "server_bench"
harness = false

[lib]
name = "avx_http"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.bench]
opt-level = 3
lto = true
