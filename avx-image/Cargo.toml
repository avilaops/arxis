[package]
name = "avx-image"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Computer Vision, OCR, Face Recognition & Photometry for Avila Platform - Image processing, feature extraction, analysis"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avx-image"
readme = "README.md"
keywords = [
    "computer-vision",
    "ocr",
    "face-detection",
    "image-processing",
    "photometry",
]
categories = ["computer-vision", "multimedia::images", "science"]
exclude = ["target/", "*.swp", ".git*", "examples/*.jpg", "examples/*.png"]

# Note: Sub-workspace removed - face3d-rs should be separate project

[dependencies]
# ZERO external dependencies for core functionality
# 100% native Rust implementation from scratch

# Only essential crates
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

# Optional: Multi-threading (using std::thread as fallback)
rayon = { version = "1.10", optional = true }

# Optional: SIMD (we'll implement manual SIMD with std::arch)
# No external SIMD crates needed

[dev-dependencies]
criterion = "0.5"

[features]
default = []
parallel = ["rayon"]
full = ["parallel"]
