[package]
name = "facial-recognition-physics"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
# Álgebra linear - vetores, matrizes, transformações geométricas
nalgebra = "0.32"

# Arrays N-dimensionais - imagens como matrizes
ndarray = { version = "0.15", features = ["rayon"] }

# Processamento de imagem
image = "0.24"
imageproc = "0.23"

# FFT para análise de frequência (Gabor filters)
rustfft = "6.1"

# Estatística e machine learning básico
ndarray-stats = "0.5"
# Removido ndarray-linalg por problemas com OpenBLAS no Windows
# ndarray-linalg = { version = "0.16", features = ["openblas-static"] }

# Visualização
plotters = "0.3"

# Paralelização
rayon = "1.8"

# Serialização (salvar modelos)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
