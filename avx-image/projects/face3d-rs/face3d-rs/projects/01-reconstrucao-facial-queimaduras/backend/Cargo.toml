[package]
name = "burn-reconstruction-backend"
version = "0.1.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.inc>"]
description = "Backend API for burn victim facial reconstruction - Medical AI for surgical planning"
license = "MIT OR Apache-2.0"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["macros", "multipart"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "fs", "trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Face reconstruction core
# face3d-rs = { path = "../../" }
# avx-image = { path = "../../../../../" }

# AVL Platform integration
# aviladb = { path = "../../../../../../aviladb" }
# avila-ml = { path = "../../../../../../avila-ml" }
# avila-telemetry = { path = "../../../../../../avila-telemetry" }

# Image processing
image = "0.25"
nalgebra = "0.33"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"

[dev-dependencies]
reqwest = { version = "0.11", features = ["json"] }

[[bin]]
name = "burn-reconstruction-api"
path = "src/main.rs"

[workspace]
# Empty workspace to prevent inheriting from parent
