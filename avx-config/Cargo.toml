[package]
name = "avx-config"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "Configuration management for Avila Experience Fabric - Type-safe config loading from multiple sources"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/avx-config"
readme = "README.md"
keywords = ["config", "configuration", "settings", "environment", "avx"]
categories = ["config", "development-tools"]
exclude = ["target/", "*.swp", ".git*"]

[dependencies]
serde = { version = "1", features = ["derive"] }
config = "0.14"
thiserror = "1"
