[workspace]
members = [
    "scraper-core",
    "scraper-cli",
    "examples"
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Avelan Team"]
license = "MIT"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"

# HTTP & Web
reqwest = { version = "0.12", features = ["json", "cookies", "gzip"] }
scraper = "0.20"
html5ever = "0.27"
select = "0.6"

# Headless browsing
headless_chrome = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database
aviladb-sdk = { git = "https://github.com/avila-cloud/aviladb-rust-sdk", branch = "main" }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Rate limiting
governor = "0.6"
tower = "0.4"

# Proxy & Anti-detection
reqwest-middleware = "0.3"
reqwest-retry = "0.6"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
sha2 = "0.10"
rand = "0.8"
regex = "1.10"
url = "2.5"

# CLI
clap = { version = "4.5", features = ["derive", "cargo"] }
colored = "2.1"
indicatif = "0.17"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Config
config = "0.14"
toml = "0.8"

# Testing
mockito = "1.5"
