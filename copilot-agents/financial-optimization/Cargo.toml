[package]
name = "financial-optimization-agent"
version = "0.1.0"
edition = "2021"
authors = ["AVL Cloud Platform <dev@avila.cloud>"]
description = "Financial Optimization Specialist - Tax optimization, cost minimization, and ROI analysis"

[dependencies]
# Web framework
axum = "0.7"
tokio = { version = "1.35", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Optimization
good_lp = { version = "1.7", features = ["minilp", "coin_cbc"] }

# Random & Statistics
rand = "0.8"
rand_distr = "0.4"
statrs = "0.17"

# Date/Time
chrono = { version = "0.4", features = ["serde"] }

# HTTP Client
reqwest = { version = "0.11", features = ["json"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Environment
dotenv = "0.15"

# Database (for storing optimization results)
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono"] }

# Async traits
async-trait = "0.1"

[dev-dependencies]
pretty_assertions = "1.4"
