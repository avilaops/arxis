[package]
name = "avl-observability"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Observability with metrics, logs, and distributed tracing for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avl-observability"
readme = "README.md"
keywords = [
    "observability",
    "metrics",
    "tracing",
    "monitoring",
    "prometheus",
]
categories = ["development-tools::profiling", "asynchronous"]
rust-version = "1.70"

[lib]
name = "avl_observability"
path = "src/lib.rs"

[features]
default = ["prometheus", "tracing"]
prometheus = ["dep:prometheus"]
tracing = ["avila-tracing", "tracing-subscriber", "opentelemetry"]
full = ["prometheus", "tracing"]

[dependencies]
# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }

# HTTP server
avila-web = { version = "0.1.0", path = "../avila-web" }

# Prometheus metrics
prometheus = { version = "0.13", optional = true }

# Distributed tracing
avila-tracing = { version = "0.1.0", path = "../avila-tracing", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
opentelemetry = { version = "0.27", optional = true }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
