[package]
name = "avila-location"
version = "0.1.0"
edition = "2021"
authors = ["AVL Platform Team"]
description = "Geospatial intelligence and market analysis system for optimal business location selection"
license = "MIT OR Apache-2.0"
repository = "https://github.com/avila-cloud/avila-location"
keywords = ["geospatial", "optimization", "location", "market-analysis", "business-intelligence"]
categories = ["algorithms", "data-structures", "science"]

[dependencies]
# Core serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Geospatial
geo = "0.28"
geo-types = "0.7"
geojson = "0.24"

# Mathematics & Statistics
nalgebra = "0.33"
statrs = "0.17"
ndarray = "0.16"
approx = "0.5"

# Optimization algorithms
optimization = "0.3"
argmin = "0.10"
argmin-math = { version = "0.4", features = ["nalgebra_latest"] }

# Parallel processing
rayon = "1.10"

# Clustering
linfa = "0.7"
linfa-clustering = "0.7"

# Time series & forecasting
polars = { version = "0.44", features = ["lazy", "temporal", "strings"] }

# Visualization
plotters = "0.3"
plotters-backend = "0.3"

# Random number generation
rand = "0.8"
rand_distr = "0.4"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# CLI
clap = { version = "4.5", features = ["derive", "cargo"] }
colored = "2.1"
indicatif = "0.17"
comfy-table = "7.1"

# Date/Time
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# File formats
csv = "1.3"
pdf-writer = "0.11"

[dev-dependencies]
criterion = "0.5"
proptest = "1.5"

[[bench]]
name = "optimization"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"
