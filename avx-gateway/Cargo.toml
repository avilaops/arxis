[package]
name = "avx-gateway"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "High-performance API gateway for Avila Experience Fabric - Routing, auth, rate limiting, load balancing"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avx-gateway"
readme = "README.md"
keywords = ["gateway", "api", "proxy", "microservices", "router"]
categories = ["web-programming", "network-programming", "asynchronous"]
exclude = ["target/", "*.swp", ".git*"]

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
axum = "0.7"
tower = "0.5"
uuid = { version = "1", features = ["v4"] }
http = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
anyhow = "1"

avx-config = { path = "../avx-config" }
avx-telemetry = { path = "../avx-telemetry" }
