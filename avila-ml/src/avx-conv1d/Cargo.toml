[package]
name = "avila-convexa1d"
version = "0.1.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.inc>", "AVL Cloud Platform <support@avila.cloud>"]
description = "High-performance 1D convolutions for audio and text processing - Pure Rust, zero external dependencies"
license = "MIT OR Apache-2.0"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avila-convexa1d"
keywords = ["audio", "text", "convolution", "nlp", "signal-processing"]
categories = ["algorithms", "science", "multimedia::audio", "text-processing", "no-std"]
readme = "README.md"

# Empty workspace to allow standalone publishing
[workspace]

[dependencies]
ndarray = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
