<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arxis - Processamento de Dados Científicos Simplificado</title>
    <meta name="description"
        content="Ajudamos cientistas e pesquisadores a processar dados complexos sem perder informação. Rápido, seguro e feito no Brasil.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fff;
        }

        .page {
            max-width: 100%;
        }

        section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1,
        h2,
        h3 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        h1 {
            font-size: 3rem;
            line-height: 1.2;
        }

        h2 {
            font-size: 2.5rem;
            text-align: center;
        }

        h3 {
            font-size: 1.5rem;
        }

        /* ==================== HERO ==================== */
        .hero {
            text-align: center;
            padding: 120px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .hero h1 {
            color: white;
            margin-bottom: 30px;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.95;
        }

        .cta-button {
            background: white;
            color: #667eea;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        /* ==================== PROBLEM ==================== */
        .problem {
            background: #f9f9f9;
        }

        .problem-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 20px;
        }

        /* ==================== SOLUTION ==================== */
        .solution {
            background: white;
        }

        .benefits {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .benefit {
            text-align: center;
        }

        .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 20px;
        }

        /* ==================== HOW IT WORKS ==================== */
        .how-it-works {
            background: #f9f9f9;
        }

        .timeline {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .step-number {
            background: #667eea;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* ==================== RESULTS ==================== */
        .results {
            background: white;
        }

        .testimonials {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .testimonial {
            background: #f9f9f9;
            padding: 40px;
            border-radius: 20px;
            border-left: 5px solid #667eea;
        }

        .quote {
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .author {
            text-align: right;
            color: #666;
            font-weight: bold;
        }

        /* ==================== CTA ==================== */
        .cta {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .cta h2 {
            color: white;
        }

        .contact-options {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .contact-btn {
            background: white;
            color: #667eea;
            padding: 20px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .contact-btn:hover {
            transform: translateY(-3px);
        }

        .guarantee {
            margin-top: 30px;
            font-size: 1.2rem;
            opacity: 0.95;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .hero {
                padding: 80px 20px;
            }

            section {
                padding: 60px 20px;
            }

            .testimonials {
                grid-template-columns: 1fr;
            }

            .step {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>
</body>

</html>
