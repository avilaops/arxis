[package]
name = "avl-secrets"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "AVL Secrets - Secure secrets management for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/avl-secrets"
readme = "README.md"
keywords = ["secrets", "vault", "encryption", "security", "credentials"]
categories = ["cryptography", "authentication"]

[dependencies]
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
anyhow = "1.0"

# Cryptography
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
argon2 = "0.5"
rand = "0.8"

# Networking
axum = "0.7"
tower = "0.5"

# Storage
aviladb = { path = "../aviladb" }

# Time
chrono = "0.4"
uuid = { version = "1.11", features = ["v4"] }

# Observability
tracing = "0.1"
avx-telemetry = { path = "../avx-telemetry" }

[package.metadata.docs.rs]
all-features = true
