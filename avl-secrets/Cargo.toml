[package]
name = "avl-secrets"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Secrets management with encryption, rotation, and versioning for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avl-secrets"
readme = "README.md"
keywords = [
    "secrets",
    "encryption",
    "vault",
    "key-management",
    "security",
]
categories = ["cryptography", "web-programming", "asynchronous"]
rust-version = "1.70"

[lib]
name = "avl_secrets"
path = "src/lib.rs"

[features]
default = ["database"]
database = ["aviladb"]
full = ["database"]

[dependencies]
# AVL Cloud Platform integration
aviladb = { version = "0.1.0", path = "../aviladb", optional = true }

# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }
avila-future = { version = "0.1.0", path = "../avila-future" }

# HTTP server
avila-web = { version = "0.1.0", path = "../avila-web" }

# Cryptography (AES-256-GCM, ChaCha20-Poly1305)
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
argon2 = "0.5"
avila-crypto = { version = "0.1.0", path = "../avila-crypto" }
avila-rand = { version = "0.1.0", path = "../avila-rand" }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# UUID generation
avila-id = { version = "0.1.0", path = "../avila-id" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

# Logging
avila-tracing = { version = "0.1.0", path = "../avila-tracing" }

# Base64 encoding

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
