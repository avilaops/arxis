[package]
name = "avl-console"
version = "0.3.0"
edition = "2021"
authors = ["Nicolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "AVL Console - Advanced developer portal with AI Assistant, ML-powered monitoring and visual query builder"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/avl-console"
readme = "README.md"
keywords = ["console", "dashboard", "portal", "monitoring", "rbac"]
categories = ["web-programming", "gui", "database"]

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Web framework
axum = { version = "0.7", features = ["ws", "macros"] }
tower = { version = "0.5", features = ["full"] }
tower-http = { version = "0.6", features = ["fs", "trace", "compression-full", "cors"] }

# WebSocket
futures = "0.3"

# Pattern matching
regex = "1.10"
lazy_static = "1.4"

# Templates
askama = { version = "0.12", features = ["with-axum"] }

# Authentication
avl-auth = { path = "../avl-auth", optional = true }

# APIs
aviladb = { path = "../aviladb", optional = true }
avl-storage = { path = "../avl-storage", optional = true }
avx-gateway = { path = "../avx-gateway", optional = true }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
avx-telemetry = { path = "../avx-telemetry", optional = true }
avila-telemetry = { path = "../avila-telemetry", optional = true }

[[example]]
name = "basic"
path = "examples/basic.rs"

[features]
default = ["with-telemetry"]
production = ["with-auth", "with-aviladb", "with-telemetry", "with-storage"]
full = ["production", "with-gateway"]
with-auth = ["dep:avl-auth"]
with-aviladb = ["dep:aviladb"]
with-storage = ["dep:avl-storage"]
with-gateway = ["dep:avx-gateway"]
with-telemetry = ["dep:avx-telemetry", "dep:avila-telemetry"]

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
proptest = "1.5"

[[bench]]
name = "console_bench"
harness = false

[package.metadata.docs.rs]
all-features = true
