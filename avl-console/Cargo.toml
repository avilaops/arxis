[package]
name = "avl-console"
version = "0.1.0"
edition = "2021"
authors = ["Nicolas Ávila <nicolas@avila.inc>"]
license = "MIT OR Apache-2.0"
description = "AVL Console - Developer portal and web dashboard for AVL Cloud Platform"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.rs/avl-console"
readme = "README.md"
keywords = ["console", "dashboard", "portal", "ui", "admin"]
categories = ["web-programming", "gui"]

[dependencies]
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
anyhow = "1.0"

# Web framework
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "trace"] }

# Templates
askama = "0.14"

# Authentication
avl-auth = { path = "../avl-auth" }

# APIs
aviladb = { path = "../aviladb" }
avl-storage = { path = "../avl-storage" }
avx-gateway = { path = "../avx-gateway" }

# Observability
tracing = "0.1"
avx-telemetry = { path = "../avx-telemetry" }

[package.metadata.docs.rs]
all-features = true
