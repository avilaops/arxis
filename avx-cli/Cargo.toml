[package]
name = "avx-cli"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Command-line tools for Avila Experience Fabric - Project management, deployment, monitoring"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avx-cli"
readme = "README.md"
keywords = ["cli", "command-line", "tools", "deployment", "devops"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["target/", "*.swp", ".git*"]

[dependencies]
# CLI Framework
clap = { version = "4", features = ["derive", "color", "suggestions"] }
clap_complete = "4"
anyhow = "1"

# Output formatting
tabled = "0.15"
colored_json = "4"
console = "0.16"
indicatif = "0.17"
dialoguer = "0.11"

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# AVX Ecosystem
avx-config = { version = "0.1", path = "../avx-config" }
avx-telemetry = { version = "0.1", path = "../avx-telemetry" }
avx-events = { version = "0.1", path = "../avx-events" }

# AvilaDB (when available)
# aviladb = "0.1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
