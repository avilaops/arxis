[package]
name = "avila-telemetry"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Arxis Observatory: Monitoring the AXIS (engine) - Time series, ARIMA, anomaly detection, forecasting, NASA-grade data quality"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avila-telemetry"
readme = "README.md"
keywords = ["arxis", "time-series", "forecasting", "anomaly", "nasa-quality"]
categories = ["science", "algorithms"]
exclude = ["target/", "*.swp", ".git*"]

[dependencies]
# Core dependencies
avila-serde = { version = "0.2.0", path = "../avila-serde" }
avila-time = { version = "0.1.0", path = "../avila-time" }

# Numerical computing
ndarray = "0.17"
num-traits = "0.2"

# Statistics
statrs = "0.16"

# Optional: FFT and signal processing
avila-fft = { version = "0.3.0", path = "../avila-fft", optional = true }

[dev-dependencies]
criterion = "0.5"
approx = "0.5"

[features]
default = ["fft"]
fft = ["avila-fft"]

# [[bench]]
# name = "time_series_bench"
# harness = false
