[package]
name = "avx-telemetry"
version = "0.1.0"
edition = "2021"
authors = ["Avila DevOps <nicolas@avila.inc>"]
description = "Avx telemetry - Observability layer for Avila Experience Fabric"

[dependencies]
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
serde = { version = "1", features = ["derive"] }
