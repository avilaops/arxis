[package]
name = "avx-telemetry"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Telemetry middleware and utilities for AVX API Gateway"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.inc"
documentation = "https://docs.rs/avx-telemetry"
readme = "README.md"
keywords = [
    "telemetry",
    "middleware",
    "metrics",
    "monitoring",
]
categories = ["web-programming", "asynchronous", "development-tools::profiling"]
rust-version = "1.70"

[lib]
name = "avx_telemetry"
path = "src/lib.rs"

[features]
default = []
middleware = ["avila-web"]
observability = ["avl-observability"]
full = ["middleware", "observability"]

[dependencies]
# AVL Cloud Platform integration
avl-observability = { version = "0.1.0", path = "../avl-observability", optional = true }

# Async runtime
avila-async = { version = "0.5.0", path = "../avila-async" }

# HTTP middleware
avila-web = { version = "0.1.0", path = "../avila-web", optional = true }

# Tracing
avila-tracing = { version = "0.1.0", path = "../avila-tracing" }

# Time handling
avila-time = { version = "0.1.0", path = "../avila-time" }

# Serialization
avila-serde = { version = "0.2.0", path = "../avila-serde" }

# UUID generation
avila-id = { version = "0.1.0", path = "../avila-id" }

# Error handling
avila-error = { version = "0.2.0", path = "../avila-error" }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true
incremental = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
