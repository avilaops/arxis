[package]
name = "arxis-cli-tools"
version = "0.1.0"
edition = "2021"
resolver = "2"

# Ferramentas práticas CLI para turbinar seu PC Windows

[workspace]
# This is a standalone workspace

[[bin]]
name = "avila-compress-cli"
path = "src/compress_cli.rs"

[[bin]]
name = "avx-bench"
path = "src/http_bench.rs"

[[bin]]
name = "avila-convert"
path = "src/data_converter.rs"

[[bin]]
name = "workspace-indexer"
path = "src/workspace_indexer.rs"

[dependencies]
avila-compress = { path = "../../avila-compress" }
avx-http = { path = "../../avx-http" }
avila-arrow = { path = "../../avila-arrow" }
tokio = { version = "1.40", features = ["full"] }
clap = { version = "4.5", features = ["derive", "color"] }
indicatif = "0.17"
walkdir = "2.5"
humantime = "2.1"
byte-unit = "5.1"
colored = "2.1"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
chrono = "0.4"
anyhow = "1.0"

[profile.release]
opt-level = 3              # Máxima otimização
lto = "fat"                # Link-Time Optimization para melhor performance
codegen-units = 1          # Melhor otimização (compilação mais lenta)
strip = true               # Remove símbolos de debug (binário menor)
panic = "abort"            # Reduz tamanho do binário
