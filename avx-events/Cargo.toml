[package]
name = "avx-events"
version = "0.1.0"
edition = "2021"
authors = [
    "Nícolas Ávila <nicolas@avila.inc>",
    "Avila Development Team <dev@avila.inc>",
]
license = "MIT OR Apache-2.0"
description = "Event-driven architecture for Avila Experience Fabric - Pub/sub, event bus, and message patterns"
repository = "https://github.com/avilaops/arxis"
homepage = "https://arxis.avilaops.com"
documentation = "https://docs.rs/avx-events"
readme = "README.md"
keywords = ["events", "pubsub", "event-bus", "messaging", "async"]
categories = ["asynchronous", "network-programming"]
exclude = ["target/", "*.swp", ".git*"]

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "sync"] }
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
bytes = "1"
url = "2"
futures = "0.3"

avx-config = { version = "0.1", path = "../avx-config" }
avx-telemetry = { version = "0.1", path = "../avx-telemetry" }

# OPC UA support (optional) - Requires OpenSSL, enable manually if needed
# opcua = { version = "0.12", optional = true }

# MQTT support (optional)
rumqttc = { version = "0.24", optional = true, default-features = false, features = ["use-rustls"] }

# Time-series support (optional)
influxdb2 = { version = "0.5", optional = true, default-features = false, features = ["rustls"] }

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = "0.3"

[features]
default = []
redis = []
# opcua = ["dep:opcua"]  # Commented out - requires OpenSSL setup
mqtt = ["dep:rumqttc"]
timeseries = ["dep:influxdb2"]
industry40 = ["mqtt", "timeseries"]  # Removed opcua for now
full = ["redis", "mqtt", "timeseries"]

[lib]
name = "avx_events"
path = "src/lib.rs"
