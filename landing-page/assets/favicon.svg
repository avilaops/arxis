<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B4FE8;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background (optional, remove for transparent) -->
    <rect width="100" height="100" fill="#0A1628" rx="20" />

    <!-- Quaternion Spiral - 4 nodes representing quaternion components (w, i, j, k) -->
    <circle cx="50" cy="25" r="8" fill="url(#logoGradient)" />
    <circle cx="75" cy="50" r="8" fill="url(#logoGradient)" />
    <circle cx="50" cy="75" r="8" fill="url(#logoGradient)" />
    <circle cx="25" cy="50" r="8" fill="url(#logoGradient)" />

    <!-- Connecting lines forming rotation path -->
    <line x1="50" y1="25" x2="75" y2="50" stroke="url(#logoGradient)" stroke-width="3"
        stroke-linecap="round" />
    <line x1="75" y1="50" x2="50" y2="75" stroke="url(#logoGradient)" stroke-width="3"
        stroke-linecap="round" />
    <line x1="50" y1="75" x2="25" y2="50" stroke="url(#logoGradient)" stroke-width="3"
        stroke-linecap="round" />
    <line x1="25" y1="50" x2="50" y2="25" stroke="url(#logoGradient)" stroke-width="3"
        stroke-linecap="round" />

    <!-- Optional: Add glow effect -->
    <circle cx="50" cy="25" r="10" fill="url(#logoGradient)" opacity="0.3" />
    <circle cx="75" cy="50" r="10" fill="url(#logoGradient)" opacity="0.3" />
    <circle cx="50" cy="75" r="10" fill="url(#logoGradient)" opacity="0.3" />
    <circle cx="25" cy="50" r="10" fill="url(#logoGradient)" opacity="0.3" />
</svg>
