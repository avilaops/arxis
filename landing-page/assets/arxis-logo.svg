<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="solarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Quaternion Spiral Logo -->
  <!-- Top point -->
  <circle cx="100" cy="50" r="16" fill="url(#solarGradient)" filter="url(#glow)" />
  
  <!-- Right point -->
  <circle cx="150" cy="100" r="16" fill="url(#solarGradient)" filter="url(#glow)" />
  
  <!-- Bottom point -->
  <circle cx="100" cy="150" r="16" fill="url(#solarGradient)" filter="url(#glow)" />
  
  <!-- Left point -->
  <circle cx="50" cy="100" r="16" fill="url(#solarGradient)" filter="url(#glow)" />
  
  <!-- Connecting lines (forming rotation pattern) -->
  <line x1="100" y1="50" x2="150" y2="100" stroke="url(#solarGradient)" stroke-width="6" stroke-linecap="round" />
  <line x1="150" y1="100" x2="100" y2="150" stroke="url(#solarGradient)" stroke-width="6" stroke-linecap="round" />
  <line x1="100" y1="150" x2="50" y2="100" stroke="url(#solarGradient)" stroke-width="6" stroke-linecap="round" />
  <line x1="50" y1="100" x2="100" y2="50" stroke="url(#solarGradient)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Center point (axis) -->
  <circle cx="100" cy="100" r="12" fill="#FFFFFF" stroke="url(#solarGradient)" stroke-width="4" />
  
  <!-- Inner cross (representing 4D axes) -->
  <line x1="85" y1="100" x2="115" y2="100" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" opacity="0.8" />
  <line x1="100" y1="85" x2="100" y2="115" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" opacity="0.8" />
</svg>
