[package]
name = "arxis-icon-processor"
version = "1.0.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.cloud>"]
description = "High-performance icon processor with background removal and multi-platform optimization"
license = "MIT"
repository = "https://github.com/avilaops/arxis"
keywords = ["icons", "image-processing", "favicon", "pwa", "optimization"]
categories = ["command-line-utilities", "multimedia::images"]

[workspace]
# Empty workspace to prevent this package from being included in parent workspace

[dependencies]
# Image processing - minimal features
image = { version = "0.25", default-features = false, features = [
    "png",
    "jpeg",
    "ico",
] }

# CLI - simplified
clap = { version = "4.5", features = ["derive"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
anyhow = "1.0"

[dev-dependencies]
criterion = "0.5" # Benchmarking
tempfile = "3.10" # Temporary directories for tests

[[bin]]
name = "arxis-icons"
path = "src/main.rs"


codegen-units = 1
strip = true

[profile.bench]
inherits = "release"
