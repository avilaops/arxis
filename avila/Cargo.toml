[package]
name = "avila"
version = "0.2.0"
edition = "2021"
authors = ["Nícolas Ávila <nicolas@avila.cloud>"]
license = "MIT OR Apache-2.0"
description = "AVL Cloud Platform - Suite completa para computação de alto desempenho, ML, databases e cloud services otimizada para Brasil e LATAM"
repository = "https://github.com/avilaops/arxis"
homepage = "https://avila.cloud"
documentation = "https://docs.avila.cloud"
keywords = ["cloud", "platform", "brazil", "latam", "distributed"]
categories = ["development-tools", "database", "web-programming", "network-programming"]
readme = "README.md"

[dependencies]
# Core Data Science & ML
avila-compress = { version = "0.8", path = "../avila-compress", optional = true }
avila-clustering = { version = "0.1", path = "../avila-clustering", optional = true }
avila-linalg = { version = "0.1", path = "../avila-linalg", optional = true }
avila-math = { version = "0.1", path = "../avila-math", optional = true }
avila-arrow = { version = "0.1", path = "../avila-arrow", optional = true }
avila-telemetry = { version = "0.1", path = "../avila-telemetry", optional = true }
avila-tokenizers = { version = "0.1", path = "../avila-tokenizer", optional = true }

# Database
aviladb = { version = "0.1", path = "../aviladb", optional = true }

# AVL Cloud Services
avl-auth = { version = "0.1", path = "../avl-auth", optional = true }
avl-console = { version = "0.3", path = "../avl-console", optional = true }
avl-observability = { version = "0.1", path = "../avl-observability", optional = true }
avl-queue = { version = "0.1", path = "../avl-queue", optional = true }
avl-secrets = { version = "0.1", path = "../avl-secrets", optional = true }
# avl-storage = { version = "0.1", path = "../avl-storage", optional = true } # Aguardando rate limit

# AVX Runtime & Networking
avx-cli = { version = "0.1", path = "../avx-cli", optional = true }
avx-config = { version = "0.1", path = "../avx-config", optional = true }
avx-events = { version = "0.1", path = "../avx-events", optional = true }
avx-http = { version = "0.2", path = "../avx-http", optional = true }
avx-telemetry = { version = "0.1", path = "../avx-telemetry", optional = true }

[features]
default = ["compress", "math", "http", "db"]

# Core features
compress = ["avila-compress"]
clustering = ["avila-clustering"]
linalg = ["avila-linalg"]
math = ["avila-math"]
arrow = ["avila-arrow"]
telemetry = ["avila-telemetry"]
tokenizers = ["avila-tokenizers"]

# Database
db = ["aviladb"]

# Cloud Services
auth = ["avl-auth"]
console = ["avl-console"]
observability = ["avl-observability"]
queue = ["avl-queue"]
secrets = ["avl-secrets"]
# storage = ["avl-storage"] # Aguardando rate limit

# Runtime
cli = ["avx-cli"]
config = ["avx-config"]
events = ["avx-events"]
http = ["avx-http"]
avx-telemetry-feature = ["avx-telemetry"]

# Bundles
science = ["math", "linalg", "arrow", "telemetry"]
ai = ["clustering", "tokenizers", "math"]
cloud = ["auth", "console", "observability", "queue", "secrets"]
runtime = ["cli", "config", "events", "http", "avx-telemetry-feature"]
full = ["compress", "clustering", "linalg", "math", "arrow", "telemetry", "tokenizers", "db", "auth", "console", "observability", "queue", "secrets", "cli", "config", "events", "http", "avx-telemetry-feature"]

[dev-dependencies]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
